<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EstiMetric | Architectural Command Center</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Global Error Handler -->
  <script>
    window.addEventListener('error', function(e) {
      if (e.target && e.target.tagName === 'SCRIPT') {
        const src = e.target.src || 'Inline Script or Unknown';
        console.error('CRITICAL: Script load failure:', src);
      }
    }, true);
    window.onerror = function(msg, url, line, col, error) {
      console.error('RUNTIME ERROR:', msg, 'at', url, 'line', line);
      return false;
    };
    window.process = { env: { NODE_ENV: 'production' } };
  </script>

  <!-- High-Availability Graphics & Logic Dependencies -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <!-- Using a specific stable OpenCV build to prevent load timeouts -->
  <script src="https://cdn.jsdelivr.net/npm/@techstark/opencv-js@4.9.0-release.2/dist/opencv.js" async></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --slate-900: #020617;
      --blue-500: #3b82f6;
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--slate-900); 
      background-image: 
        radial-gradient(circle at 0% 0%, rgba(59, 130, 246, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 100% 100%, rgba(30, 58, 138, 0.08) 0%, transparent 50%);
      overflow: hidden;
      color: #f1f5f9;
      margin: 0;
      height: 100vh;
      width: 100vw;
    }
    .glass-panel { 
      background: rgba(15, 23, 42, 0.6); 
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }
    .brushed-metal { 
      background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.95) 100%); 
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .luxury-shadow { 
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
    }
    .glow-blue {
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    #loading-screen {
      position: fixed;
      inset: 0;
      background: #020617;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }

    .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    .animate-slideInRight { animation: slideInRight 0.4s ease-out forwards; }
    @keyframes slideInRight { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }

    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.2); border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(59, 130, 246, 0.4); }
  </style>
  
  <link rel="stylesheet" href="/index.css">
</head>
<body>
  <div id="loading-screen">
    <div class="relative w-20 h-20">
      <div class="absolute inset-0 border-4 border-blue-500/10 rounded-full"></div>
      <div class="absolute inset-0 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
      <div class="absolute inset-0 flex items-center justify-center font-black text-blue-500 italic">E</div>
    </div>
    <div class="mt-8 text-blue-500/60 font-black tracking-[0.4em] uppercase text-[10px] animate-pulse">Initializing EstiMetric Core</div>
  </div>

  <div id="root"></div>

  <!-- The environment handles the loading of index.tsx -->

  <script type="module">
    window.addEventListener('load', () => {
      const loader = document.getElementById('loading-screen');
      if (loader) {
        setTimeout(() => {
          loader.style.opacity = '0';
          setTimeout(() => loader.remove(), 500);
        }, 1200);
      }
    });
  </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
